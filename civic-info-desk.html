<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Information Desk — Public Service Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E2A38;
    --ink-soft:#3A4A5C;
    --parchment:#EFE9DA;
    --paper:#FBF8F0;
    --stamp:#A93226;
    --stamp-dark:#7E2A20;
    --sage:#57715F;
    --line:#CBBF9E;
    --line-soft:#DED4B9;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--parchment);
    background-image:
      repeating-linear-gradient(0deg, rgba(30,42,56,0.025) 0px, rgba(30,42,56,0.025) 1px, transparent 1px, transparent 3px);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  ::selection{background:var(--stamp); color:var(--paper);}
  :focus-visible{outline:2px solid var(--stamp); outline-offset:2px;}

  /* ===== Header ===== */
  header.masthead{
    background:var(--ink);
    color:var(--parchment);
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:5px solid var(--stamp);
    flex-wrap:wrap;
    gap:10px;
  }
  .masthead-left{display:flex; align-items:center; gap:14px;}
  .seal{width:42px; height:42px; flex-shrink:0;}
  .masthead-title{font-family:'Fraunces', serif; font-weight:600; font-size:1.35rem; letter-spacing:0.01em;}
  .masthead-sub{font-family:'IBM Plex Mono', monospace; font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; color:#B9C3CE; margin-top:2px;}
  .ticket-badge{
    font-family:'IBM Plex Mono', monospace;
    border:1px solid #4A5A6C;
    padding:6px 12px;
    font-size:0.72rem;
    letter-spacing:0.08em;
    color:#D8DEE4;
    text-align:right;
    line-height:1.5;
  }
  .ticket-badge b{color:var(--parchment); font-size:0.95rem; display:block;}

  /* ===== Layout ===== */
  .desk{
    flex:1;
    width:100%;
    max-width:1180px;
    margin:0 auto;
    display:grid;
    grid-template-columns:250px 1fr;
    gap:26px;
    padding:28px 22px 40px;
  }
  @media (max-width:820px){
    .desk{grid-template-columns:1fr; padding:18px 14px 32px;}
  }

  /* ===== Sidebar / service windows ===== */
  .windows{display:flex; flex-direction:column; gap:10px;}
  .windows-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--ink-soft);
    border-bottom:1px solid var(--line);
    padding-bottom:8px;
    margin-bottom:2px;
  }
  .window-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--paper);
    border:1px solid var(--line-soft);
    border-left:3px solid transparent;
    padding:12px 12px;
    text-align:left;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:0.87rem;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .window-btn svg{flex-shrink:0; width:18px; height:18px; stroke:var(--ink-soft);}
  .window-btn:hover{background:#F4EFE2;}
  .window-btn.active{border-left-color:var(--stamp); background:#F6F1E6;}
  .window-btn.active svg{stroke:var(--stamp);}
  .window-count{margin-left:auto; font-family:'IBM Plex Mono', monospace; font-size:0.68rem; color:var(--ink-soft);}

  .sample-chips{display:flex; flex-direction:column; gap:6px; margin-top:4px;}
  .chip{
    text-align:left;
    background:transparent;
    border:1px dashed var(--line);
    color:var(--ink-soft);
    font-size:0.78rem;
    padding:7px 9px;
    cursor:pointer;
    font-family:'IBM Plex Sans', sans-serif;
    line-height:1.3;
  }
  .chip:hover{border-color:var(--stamp); color:var(--ink);}

  /* ===== Main ledger ===== */
  .ledger-wrap{
    background:var(--paper);
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:520px;
    max-height:72vh;
  }
  .ledger-head{
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    flex-wrap:wrap;
    gap:6px;
  }
  .ledger-head h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.05rem;
    margin:0;
  }
  .ledger-head span{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    color:var(--ink-soft);
    letter-spacing:0.06em;
  }
  .ledger{
    flex:1;
    overflow-y:auto;
    padding:18px 20px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .entry{display:flex; flex-direction:column; gap:8px;}
  .entry-num{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.65rem;
    color:var(--ink-soft);
    letter-spacing:0.1em;
  }
  .q-row, .a-row{display:flex; gap:10px; align-items:flex-start;}
  .bubble{
    padding:10px 13px;
    border-radius:var(--radius);
    font-size:0.92rem;
    line-height:1.5;
    max-width:78%;
  }
  .q-row{justify-content:flex-end;}
  .q-row .bubble{background:var(--ink); color:var(--parchment); border-top-right-radius:0;}
  .a-row .bubble{background:#F4EFE2; border:1px solid var(--line-soft); border-top-left-radius:0;}
  .a-row{position:relative;}
  .stamp-mark{
    flex-shrink:0;
    width:46px; height:46px;
    margin-top:2px;
    animation:stampIn .32s cubic-bezier(.2,1.4,.4,1) both;
  }
  @keyframes stampIn{
    0%{opacity:0; transform:scale(1.9) rotate(-24deg);}
    70%{opacity:1;}
    100%{opacity:1; transform:scale(1) rotate(-9deg);}
  }
  .typing .bubble{display:flex; gap:4px; align-items:center; padding:12px 14px;}
  .dot{width:5px; height:5px; background:var(--ink-soft); border-radius:50%; animation:blink 1.1s infinite ease-in-out;}
  .dot:nth-child(2){animation-delay:.15s;} .dot:nth-child(3){animation-delay:.3s;}
  @keyframes blink{0%,80%,100%{opacity:.25;} 40%{opacity:1;}}

  .composer{
    border-top:1px solid var(--line);
    padding:14px 20px;
    display:flex;
    gap:10px;
  }
  .composer input{
    flex:1;
    border:none;
    border-bottom:2px solid var(--line);
    background:transparent;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:0.92rem;
    padding:8px 2px;
    color:var(--ink);
  }
  .composer input:focus{border-bottom-color:var(--stamp); outline:none;}
  .composer button{
    background:var(--stamp);
    color:var(--paper);
    border:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:0 18px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .composer button:hover{background:var(--stamp-dark);}

  footer{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.66rem;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    padding:16px 10px 26px;
  }

  @media (prefers-reduced-motion: reduce){
    .stamp-mark, .dot{animation:none !important;}
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-left">
    <svg class="seal" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="21" stroke="#D9C98C" stroke-width="1.5"/>
      <circle cx="24" cy="24" r="15.5" stroke="#D9C98C" stroke-width="1"/>
      <path d="M24 12 L27 20 L35 20 L28.5 25 L31 33 L24 28 L17 33 L19.5 25 L13 20 L21 20 Z" fill="#D9C98C"/>
    </svg>
    <div>
      <div class="masthead-title">Civic Information Desk</div>
      <div class="masthead-sub">Public Service Query Assistant</div>
    </div>
  </div>
  <div class="ticket-badge">NOW SERVING<b id="ticketNo">No. 000</b></div>
</header>

<div class="desk">
  <!-- SIDEBAR -->
  <aside class="windows">
    <div class="windows-label">Service Windows</div>
    <button class="window-btn active" data-cat="permits">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/><path d="M9 12h6M9 16h6"/></svg>
      Permits &amp; Licenses <span class="window-count">05</span>
    </button>
    <button class="window-btn" data-cat="tax">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1.4 1.3-2.5 3-2.5s3 1 3 2.2c0 3-6 1.3-6 4.2 0 1.4 1.3 2.6 3 2.6s3-1 3-2.4"/></svg>
      Tax Payments <span class="window-count">04</span>
    </button>
    <button class="window-btn" data-cat="regulations">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M12 3v3M12 3l-6 3.5M12 3l6 3.5M3 8l3-1.5M3 8l0 0M21 8l-3-1.5M4 8h4l-2 5-2-5zM16 8h4l-2 5-2-5zM6 13v6M18 13v6M4 21h16M9 21V10M15 21V10"/></svg>
      Local Regulations <span class="window-count">03</span>
    </button>
    <button class="window-btn" data-cat="general">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M12 21c-4.4-3-8-6.4-8-10.5A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 8 4.5C20 14.6 16.4 18 12 21z" opacity="0"/><circle cx="12" cy="12" r="9"/><path d="M9.2 9.2a2.8 2.8 0 1 1 3.7 2.6c-.9.35-1 .9-1 1.7M12 17h.01"/></svg>
      General Help <span class="window-count">03</span>
    </button>

    <div class="windows-label" style="margin-top:14px;">Try Asking</div>
    <div class="sample-chips" id="chips"></div>
  </aside>

  <!-- MAIN CHAT LEDGER -->
  <main class="ledger-wrap">
    <div class="ledger-head">
      <h1>Inquiry Ledger</h1>
      <span id="dateStamp"></span>
    </div>
    <div class="ledger" id="ledger" aria-live="polite"></div>
    <form class="composer" id="composer">
      <label for="userInput" class="sr-only" style="position:absolute;left:-9999px;">Type your question</label>
      <input id="userInput" type="text" placeholder="Ask about a permit, tax payment, or local regulation…" autocomplete="off">
      <button type="submit">Submit Inquiry</button>
    </form>
  </main>
</div>

<footer>Prototype — TCS AI Friday Season 2 · Conversational AI Chatbot for Public Service Information Access</footer>

<script>
const KB = {
  permits: [
    { q:"How do I apply for a building permit?", k:["building","permit","construction","renovate","renovation","addition","build"],
      a:"Submit a building permit application with your property details and construction plans to the Building Department, along with the applicable fee. Standard residential projects are typically processed in 10–15 business days." },
    { q:"How do I get a business license?", k:["business","license","licence","open a business","storefront","register"],
      a:"Register your business name, then submit a completed application with proof of address and zoning compliance at the Business Licensing window. Most licenses are issued within 5 business days once fees are paid." },
    { q:"How do I get a residential parking permit?", k:["parking","permit","residential parking","street parking","car"],
      a:"Apply online or in person with proof of residency and vehicle registration. Residential parking permits are valid for one year and should be renewed before expiry to avoid a lapse." },
    { q:"How much does a renovation permit cost?", k:["renovation","fee","cost","how much","permit price"],
      a:"Permit fees are tiered by project value — minor repairs fall in the lowest tier, while structural additions or full renovations are assessed at a higher rate. An exact quote is generated once your application is submitted." },
    { q:"How do I check my permit application status?", k:["status","check","application","track","permit status"],
      a:"You can check your application status online using your reference number, or visit the Permit Office counter with your ticket for an in-person update." }
  ],
  tax: [
    { q:"When is property tax due?", k:["property tax","due date","when is tax due","deadline"],
      a:"Property tax is generally billed in two installments per year. Exact due dates are listed on your tax notice and the online tax portal — a reminder is sent ahead of each installment." },
    { q:"How can I pay my taxes?", k:["pay tax","payment method","how to pay tax","online payment","pay"],
      a:"Taxes can be paid through the online municipal payment portal, by bank transfer, or in person at a designated payment counter. Online payment is the fastest and gives an instant receipt." },
    { q:"What happens if I pay my tax late?", k:["penalty","late payment","overdue tax","interest","late"],
      a:"Late payments incur a penalty percentage plus accruing interest until settled. If you can't pay in full, you can request a payment plan before the due date to avoid escalation." },
    { q:"How do I file my local income tax return?", k:["income tax","filing","file taxes","tax return","file"],
      a:"Local income tax returns are filed annually through the online portal before the statutory deadline. A short-term extension can be requested if you need more time." }
  ],
  regulations: [
    { q:"What are the noise ordinance hours?", k:["noise","ordinance","loud","quiet hours"],
      a:"Quiet hours generally apply overnight (typically 10 PM–7 AM). Construction noise is restricted to daytime hours on weekdays and limited on weekends." },
    { q:"What are the waste disposal and recycling rules?", k:["waste","garbage","trash","recycling","disposal","bin"],
      a:"Household waste is collected weekly and recycling is collected biweekly on your assigned day. Bulky item pickup isn't automatic — it needs to be scheduled in advance through the portal." },
    { q:"How do I check zoning for a property?", k:["zoning","zone","land use","commercial","residential"],
      a:"Zoning determines what a property can be used for. Check the zoning map online, or contact the Planning Department before starting any project that changes a property's use." }
  ],
  general: [
    { q:"Hi", k:["hi","hello","hey","good morning","good afternoon"],
      a:"Hello — welcome to the Civic Information Desk. Ask me about permits, tax payments, or local regulations, or pick a service window on the left." },
    { q:"Thank you", k:["thanks","thank you","thx","appreciate"],
      a:"You're welcome. Let me know if there's anything else you'd like to look up." },
    { q:"Can I talk to a person?", k:["talk to a person","human agent","representative","speak to someone","real person"],
      a:"Of course — visit any service counter with your ticket number, or call the general inquiries line during office hours for direct assistance." }
  ]
};

const ALL = [...KB.permits, ...KB.tax, ...KB.regulations, ...KB.general];
let ticket = 0;
let currentCat = "permits";

const ledger = document.getElementById('ledger');
const ticketNo = document.getElementById('ticketNo');
const chips = document.getElementById('chips');
const composer = document.getElementById('composer');
const input = document.getElementById('userInput');

document.getElementById('dateStamp').textContent =
  new Date().toLocaleDateString('en-US', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();

function renderChips(cat){
  chips.innerHTML = "";
  KB[cat].slice(0,4).forEach(item=>{
    const b = document.createElement('button');
    b.className = "chip";
    b.type = "button";
    b.textContent = item.q;
    b.addEventListener('click', ()=> ask(item.q));
    chips.appendChild(b);
  });
}
renderChips(currentCat);

document.querySelectorAll('.window-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.window-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderChips(currentCat);
  });
});

function matchAnswer(text){
  const lower = text.toLowerCase();
  let best = null, bestScore = 0;
  ALL.forEach(item=>{
    let score = 0;
    item.k.forEach(kw=>{ if(lower.includes(kw)) score++; });
    if(score > bestScore){ bestScore = score; best = item; }
  });
  if(bestScore === 0){
    return "I don't have that on file yet. Try rephrasing, or pick a service window on the left — Permits, Tax Payments, or Local Regulations — for topics I can help with.";
  }
  return best.a;
}

function stampSVG(){
  return `<svg class="stamp-mark" viewBox="0 0 48 48" fill="none">
    <circle cx="24" cy="24" r="19" stroke="#A93226" stroke-width="1.4"/>
    <circle cx="24" cy="24" r="14.5" stroke="#A93226" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="24" y="21" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="6.2" fill="#A93226" font-weight="600">CIVIC</text>
    <text x="24" y="29" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="6.2" fill="#A93226" font-weight="600">DESK</text>
  </svg>`;
}

function addEntry(question){
  ticket++;
  ticketNo.textContent = "No. " + String(ticket).padStart(3,'0');

  const entry = document.createElement('div');
  entry.className = "entry";
  const num = document.createElement('div');
  num.className = "entry-num";
  num.textContent = "ENTRY " + String(ticket).padStart(3,'0') + " · " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  entry.appendChild(num);

  const qRow = document.createElement('div');
  qRow.className = "q-row";
  qRow.innerHTML = `<div class="bubble">${escapeHTML(question)}</div>`;
  entry.appendChild(qRow);

  const typingRow = document.createElement('div');
  typingRow.className = "a-row typing";
  typingRow.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  entry.appendChild(typingRow);

  ledger.appendChild(entry);
  ledger.scrollTop = ledger.scrollHeight;

  setTimeout(()=>{
    const answer = matchAnswer(question);
    typingRow.remove();
    const aRow = document.createElement('div');
    aRow.className = "a-row";
    aRow.innerHTML = `${stampSVG()}<div class="bubble">${escapeHTML(answer)}</div>`;
    entry.appendChild(aRow);
    ledger.scrollTop = ledger.scrollHeight;
  }, 650 + Math.random()*350);
}

function escapeHTML(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function ask(text){
  if(!text.trim()) return;
  addEntry(text.trim());
}

composer.addEventListener('submit', (e)=>{
  e.preventDefault();
  ask(input.value);
  input.value = "";
});

// Opening entry
addEntry("Hi");
</script>
</body>
</html>
