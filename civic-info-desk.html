<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Information Desk — Public Service Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E2A38;
    --ink-soft:#3A4A5C;
    --parchment:#EFE9DA;
    --paper:#FBF8F0;
    --stamp:#A93226;
    --stamp-dark:#7E2A20;
    --sage:#57715F;
    --line:#CBBF9E;
    --line-soft:#DED4B9;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--parchment);
    background-image:
      repeating-linear-gradient(0deg, rgba(30,42,56,0.025) 0px, rgba(30,42,56,0.025) 1px, transparent 1px, transparent 3px);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  ::selection{background:var(--stamp); color:var(--paper);}
  :focus-visible{outline:2px solid var(--stamp); outline-offset:2px;}

  header.masthead{
    background:var(--ink);
    color:var(--parchment);
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:5px solid var(--stamp);
    flex-wrap:wrap;
    gap:10px;
  }
  .masthead-left{display:flex; align-items:center; gap:14px;}
  .seal{width:42px; height:42px; flex-shrink:0;}
  .masthead-title{font-family:'Fraunces', serif; font-weight:600; font-size:1.35rem; letter-spacing:0.01em;}
  .masthead-sub{font-family:'IBM Plex Mono', monospace; font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; color:#B9C3CE; margin-top:2px;}
  .status-badge{
    font-family:'IBM Plex Mono', monospace;
    border:1px solid #4A5A6C;
    padding:6px 12px;
    font-size:0.68rem;
    letter-spacing:0.06em;
    color:#D8DEE4;
    text-align:right;
    line-height:1.5;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .status-dot{width:8px; height:8px; border-radius:50%; background:#8a8; flex-shrink:0;}
  .status-dot.offline{background:var(--stamp);}

  .desk{
    flex:1;
    width:100%;
    max-width:1180px;
    margin:0 auto;
    display:grid;
    grid-template-columns:250px 1fr;
    gap:26px;
    padding:28px 22px 40px;
  }
  @media (max-width:820px){
    .desk{grid-template-columns:1fr; padding:18px 14px 32px;}
  }

  .windows{display:flex; flex-direction:column; gap:10px;}
  .windows-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--ink-soft);
    border-bottom:1px solid var(--line);
    padding-bottom:8px;
    margin-bottom:2px;
  }
  .window-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--paper);
    border:1px solid var(--line-soft);
    border-left:3px solid transparent;
    padding:12px 12px;
    text-align:left;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:0.87rem;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .window-btn svg{flex-shrink:0; width:18px; height:18px; stroke:var(--ink-soft);}
  .window-btn:hover{background:#F4EFE2;}
  .window-btn.active{border-left-color:var(--stamp); background:#F6F1E6;}
  .window-btn.active svg{stroke:var(--stamp);}

  .sample-chips{display:flex; flex-direction:column; gap:6px; margin-top:4px;}
  .chip{
    text-align:left;
    background:transparent;
    border:1px dashed var(--line);
    color:var(--ink-soft);
    font-size:0.78rem;
    padding:7px 9px;
    cursor:pointer;
    font-family:'IBM Plex Sans', sans-serif;
    line-height:1.3;
  }
  .chip:hover{border-color:var(--stamp); color:var(--ink);}

  .ledger-wrap{
    background:var(--paper);
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:520px;
    max-height:72vh;
  }
  .ledger-head{
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    flex-wrap:wrap;
    gap:6px;
  }
  .ledger-head h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.05rem;
    margin:0;
  }
  .ledger-head span{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    color:var(--ink-soft);
    letter-spacing:0.06em;
  }
  .ledger{
    flex:1;
    overflow-y:auto;
    padding:18px 20px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .entry{display:flex; flex-direction:column; gap:8px;}
  .entry-num{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.65rem;
    color:var(--ink-soft);
    letter-spacing:0.1em;
  }
  .q-row, .a-row{display:flex; gap:10px; align-items:flex-start;}
  .bubble{
    padding:10px 13px;
    border-radius:var(--radius);
    font-size:0.92rem;
    line-height:1.5;
    max-width:78%;
    white-space:pre-wrap;
  }
  .q-row{justify-content:flex-end;}
  .q-row .bubble{background:var(--ink); color:var(--parchment); border-top-right-radius:0;}
  .a-row .bubble{background:#F4EFE2; border:1px solid var(--line-soft); border-top-left-radius:0;}
  .a-row.error .bubble{background:#F7E6E3; border-color:#D9B3AC; color:var(--stamp-dark);}
  .stamp-mark{
    flex-shrink:0;
    width:46px; height:46px;
    margin-top:2px;
    animation:stampIn .32s cubic-bezier(.2,1.4,.4,1) both;
  }
  @keyframes stampIn{
    0%{opacity:0; transform:scale(1.9) rotate(-24deg);}
    70%{opacity:1;}
    100%{opacity:1; transform:scale(1) rotate(-9deg);}
  }
  .typing .bubble{display:flex; gap:4px; align-items:center; padding:12px 14px;}
  .dot{width:5px; height:5px; background:var(--ink-soft); border-radius:50%; animation:blink 1.1s infinite ease-in-out;}
  .dot:nth-child(2){animation-delay:.15s;} .dot:nth-child(3){animation-delay:.3s;}
  @keyframes blink{0%,80%,100%{opacity:.25;} 40%{opacity:1;}}

  .composer{
    border-top:1px solid var(--line);
    padding:14px 20px;
    display:flex;
    gap:10px;
  }
  .composer input{
    flex:1;
    border:none;
    border-bottom:2px solid var(--line);
    background:transparent;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:0.92rem;
    padding:8px 2px;
    color:var(--ink);
  }
  .composer input:focus{border-bottom-color:var(--stamp); outline:none;}
  .composer button{
    background:var(--stamp);
    color:var(--paper);
    border:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:0 18px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .composer button:hover{background:var(--stamp-dark);}
  .composer button:disabled{opacity:.5; cursor:not-allowed;}

  footer{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.66rem;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    padding:16px 10px 26px;
  }

  @media (prefers-reduced-motion: reduce){
    .stamp-mark, .dot{animation:none !important;}
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-left">
    <svg class="seal" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="21" stroke="#D9C98C" stroke-width="1.5"/>
      <circle cx="24" cy="24" r="15.5" stroke="#D9C98C" stroke-width="1"/>
      <path d="M24 12 L27 20 L35 20 L28.5 25 L31 33 L24 28 L17 33 L19.5 25 L13 20 L21 20 Z" fill="#D9C98C"/>
    </svg>
    <div>
      <div class="masthead-title">Civic Information Desk</div>
      <div class="masthead-sub">Public Service Query Assistant</div>
    </div>
  </div>
  <div class="status-badge"><span class="status-dot offline" id="statusDot"></span><span id="statusText">Connecting…</span></div>
</header>

<div class="desk">
  <aside class="windows">
    <div class="windows-label">Service Windows</div>
    <button class="window-btn active" data-cat="permits">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/><path d="M9 12h6M9 16h6"/></svg>
      Permits &amp; Licenses
    </button>
    <button class="window-btn" data-cat="tax">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1.4 1.3-2.5 3-2.5s3 1 3 2.2c0 3-6 1.3-6 4.2 0 1.4 1.3 2.6 3 2.6s3-1 3-2.4"/></svg>
      Tax Payments
    </button>
    <button class="window-btn" data-cat="regulations">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M12 3v3M12 3l-6 3.5M12 3l6 3.5M3 8l3-1.5M3 8l0 0M21 8l-3-1.5M4 8h4l-2 5-2-5zM16 8h4l-2 5-2-5zM6 13v6M18 13v6M4 21h16M9 21V10M15 21V10"/></svg>
      Local Regulations
    </button>
    <button class="window-btn" data-cat="general">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M9.2 9.2a2.8 2.8 0 1 1 3.7 2.6c-.9.35-1 .9-1 1.7M12 17h.01"/></svg>
      General Help
    </button>

    <div class="windows-label" style="margin-top:14px;">Try Asking</div>
    <div class="sample-chips" id="chips"></div>
  </aside>

  <main class="ledger-wrap">
    <div class="ledger-head">
      <h1>Inquiry Ledger</h1>
      <span id="dateStamp"></span>
    </div>
    <div class="ledger" id="ledger" aria-live="polite"></div>
    <form class="composer" id="composer">
      <label for="userInput" style="position:absolute;left:-9999px;">Type your question</label>
      <input id="userInput" type="text" placeholder="Ask about a permit, tax payment, or local regulation…" autocomplete="off">
      <button type="submit" id="sendBtn">Submit Inquiry</button>
    </form>
  </main>
</div>

<footer>Prototype — TCS AI Friday Season 2 · Conversational AI Chatbot for Public Service Information Access</footer>

<script>
// Change this if your backend runs somewhere other than localhost:5000
const BACKEND_URL = "http://127.0.0.1:5000/api/chat";

const SAMPLES = {
  permits: ["How do I apply for a building permit?", "How do I get a business license?", "How do I get a residential parking permit?", "How do I check my permit status?"],
  tax: ["When is property tax due?", "How can I pay my taxes?", "What happens if I pay late?", "How do I file my income tax return?"],
  regulations: ["What are the noise ordinance hours?", "What are the waste disposal rules?", "How do I check zoning for a property?"],
  general: ["Hi", "Can I talk to a person?", "What can you help me with?"]
};

let ticket = 0;
let currentCat = "permits";

const ledger = document.getElementById('ledger');
const chips = document.getElementById('chips');
const composer = document.getElementById('composer');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

document.getElementById('dateStamp').textContent =
  new Date().toLocaleDateString('en-US', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();

function renderChips(cat){
  chips.innerHTML = "";
  SAMPLES[cat].forEach(q=>{
    const b = document.createElement('button');
    b.className = "chip";
    b.type = "button";
    b.textContent = q;
    b.addEventListener('click', ()=> ask(q));
    chips.appendChild(b);
  });
}
renderChips(currentCat);

document.querySelectorAll('.window-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.window-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderChips(currentCat);
  });
});

function stampSVG(){
  return `<svg class="stamp-mark" viewBox="0 0 48 48" fill="none">
    <circle cx="24" cy="24" r="19" stroke="#A93226" stroke-width="1.4"/>
    <circle cx="24" cy="24" r="14.5" stroke="#A93226" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="24" y="21" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="6.2" fill="#A93226" font-weight="600">CIVIC</text>
    <text x="24" y="29" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="6.2" fill="#A93226" font-weight="600">DESK</text>
  </svg>`;
}

function escapeHTML(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function addEntry(question){
  ticket++;
  sendBtn.disabled = true;

  const entry = document.createElement('div');
  entry.className = "entry";
  const num = document.createElement('div');
  num.className = "entry-num";
  num.textContent = "ENTRY " + String(ticket).padStart(3,'0') + " · " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  entry.appendChild(num);

  const qRow = document.createElement('div');
  qRow.className = "q-row";
  qRow.innerHTML = `<div class="bubble">${escapeHTML(question)}</div>`;
  entry.appendChild(qRow);

  const typingRow = document.createElement('div');
  typingRow.className = "a-row typing";
  typingRow.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  entry.appendChild(typingRow);

  ledger.appendChild(entry);
  ledger.scrollTop = ledger.scrollHeight;

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: question })
    });
    const data = await res.json();
    typingRow.remove();

    const aRow = document.createElement('div');
    if (!res.ok || data.error) {
      aRow.className = "a-row error";
      aRow.innerHTML = `<div class="bubble">Couldn't reach the assistant: ${escapeHTML(data.error || 'unknown error')}</div>`;
    } else {
      aRow.className = "a-row";
      aRow.innerHTML = `${stampSVG()}<div class="bubble">${escapeHTML(data.answer)}</div>`;
    }
    entry.appendChild(aRow);
    setStatus(true);
  } catch (err) {
    typingRow.remove();
    const aRow = document.createElement('div');
    aRow.className = "a-row error";
    aRow.innerHTML = `<div class="bubble">Can't reach the backend server. Make sure server.py is running on port 5000.</div>`;
    entry.appendChild(aRow);
    setStatus(false);
  }

  ledger.scrollTop = ledger.scrollHeight;
  sendBtn.disabled = false;
}

function setStatus(online){
  statusDot.classList.toggle('offline', !online);
  statusText.textContent = online ? "Connected" : "Backend offline";
}

async function checkHealth(){
  try {
    const res = await fetch(BACKEND_URL.replace('/api/chat', '/health'));
    setStatus(res.ok);
  } catch {
    setStatus(false);
  }
}
checkHealth();

function ask(text){
  if(!text.trim()) return;
  addEntry(text.trim());
}

composer.addEventListener('submit', (e)=>{
  e.preventDefault();
  ask(input.value);
  input.value = "";
});
</script>
</body>
</html>
